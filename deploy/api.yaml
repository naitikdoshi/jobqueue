apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: jobqueue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: registry-jobqueue
      containers:
        - name: api
          image: registry.digitalocean.com/jobqueue/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: jobqueue-secrets
                  key: DATABASE_URL
            - name: PG_SSL
              value: "true"
            - name: PORT
              value: "3000"
            - name: ALLOWED_HANDLERS
              value: "echo,fail-once,slow"
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: jobqueue
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 3000
