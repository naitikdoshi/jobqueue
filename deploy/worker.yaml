apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: jobqueue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: registry-jobqueue
      containers:
        - name: worker
          image: registry.digitalocean.com/jobqueue/worker:latest
          imagePullPolicy: Always
          env:
            - name: API_URL
              value: "http://api.jobqueue.svc.cluster.local"
            - name: WORKER_QUEUES
              value: "default"
            - name: WORKER_CONCURRENCY
              value: "1"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
